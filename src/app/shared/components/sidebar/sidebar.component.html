<aside class="sidebar" [class.collapsed]="collapsed" [class.mobile-open]="mobileOpen">
  <div class="sidebar-header">
    <!-- <div class="sidebar-logo">
      <div class="logo-icon">D</div>
      <span class="logo-text" *ngIf="!collapsed">DoronX</span>
    </div> -->
    <div class="auth-logo">
      <!-- <div class="auth-logo-mark">D</div>
      <span class="auth-logo-text">DoronX</span> -->
      <img src="/assets/images/dorx-full.png" width="100" />
    </div>
    <button class="collapse-btn" (click)="toggle()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline *ngIf="!collapsed" points="15 18 9 12 15 6"></polyline>
        <polyline *ngIf="collapsed"  points="9 18 15 12 9 6"></polyline>
      </svg>
    </button>
  </div>

  <nav class="sidebar-nav">
    <a *ngFor="let item of navItems"
       [routerLink]="item.route" routerLinkActive="active"
       class="nav-item" [class.collapsed]="collapsed"
       (click)="closeMobile()" [title]="collapsed ? item.label : ''">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <ng-container [ngSwitch]="item.icon">
            <ng-container *ngSwitchCase="'grid'">
              <rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect>
            </ng-container>
            <ng-container *ngSwitchCase="'file-text'">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
            </ng-container>
            <ng-container *ngSwitchCase="'qr-code'">
              <rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
              <line x1="14" y1="14" x2="14" y2="14"></line><line x1="21" y1="14" x2="21" y2="14"></line>
              <line x1="14" y1="21" x2="21" y2="21"></line><line x1="21" y1="17" x2="21" y2="21"></line>
              <line x1="14" y1="17" x2="17" y2="17"></line>
            </ng-container>
            <ng-container *ngSwitchCase="'credit-card'">
              <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
              <line x1="1" y1="10" x2="23" y2="10"></line>
            </ng-container>
            <ng-container *ngSwitchCase="'trending-up'">
              <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
              <polyline points="17 6 23 6 23 12"></polyline>
            </ng-container>
            <ng-container *ngSwitchCase="'zap'">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
            </ng-container>
            <ng-container *ngSwitchCase="'bar-chart-2'">
              <line x1="18" y1="20" x2="18" y2="10"></line>
              <line x1="12" y1="20" x2="12" y2="4"></line>
              <line x1="6" y1="20" x2="6" y2="14"></line>
            </ng-container>
            <ng-container *ngSwitchCase="'dollar-sign'">
              <line x1="12" y1="1" x2="12" y2="23"></line>
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </ng-container>
          </ng-container>
        </svg>
      </span>
      <span class="nav-label" *ngIf="!collapsed">{{ item.label }}</span>
    </a>
  </nav>

  <!-- env badge -->
  <div class="sidebar-env" *ngIf="!collapsed && envBadge">
    <span class="env-chip" [class.env-live]="envBadge === 'LIVE'" [class.env-test]="envBadge === 'TEST'">
      {{ envBadge }}
    </span>
  </div>

  <div class="sidebar-footer" *ngIf="!collapsed">
    <div class="user-info">
      <div class="user-avatar">{{ initials }}</div>
      <div class="user-meta">
        <div class="user-name">{{ displayName }}</div>
        <div class="user-role">{{ auth?.user?.role || 'OWNER' }}</div>
      </div>
    </div>
    <button class="logout-btn" (click)="logout()" title="Logout">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
    </button>
  </div>
  <div class="sidebar-footer collapsed-footer" *ngIf="collapsed">
    <div class="user-avatar small">{{ initials }}</div>
  </div>
</aside>
<div class="sidebar-overlay" *ngIf="mobileOpen" (click)="closeMobile()"></div>
