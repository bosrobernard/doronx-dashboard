<div class="modal-backdrop" *ngIf="current" (click)="cancel()">
  <div class="modal-box" (click)="$event.stopPropagation()">

    <!-- Icon -->
    <div class="modal-icon" [class.modal-icon--danger]="current.danger">
      <svg *ngIf="current.danger" width="22" height="22" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
        <line x1="12" y1="9" x2="12" y2="13"></line>
        <line x1="12" y1="17" x2="12.01" y2="17"></line>
      </svg>
      <svg *ngIf="!current.danger" width="22" height="22" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
    </div>

    <h3 class="modal-title">{{ current.title }}</h3>
    <p class="modal-message">{{ current.message }}</p>

    <div class="modal-actions">
      <button class="btn-ghost-sm" (click)="cancel()">
        {{ current.cancelLabel || 'Cancel' }}
      </button>
      <button
        [class]="current.danger ? 'btn-danger' : 'btn-primary'"
        (click)="confirm()">
        {{ current.confirmLabel || 'Confirm' }}
      </button>
    </div>
  </div>
</div>
